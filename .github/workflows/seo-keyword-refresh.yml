name: SEO — Keyword Refresh

# Pulls Google Trends MX keywords every Monday and opens a PR with edits to
# marker-delimited regions only. Owner reviews the PR — never auto-merge.
on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC (08:00 Cancún)
  workflow_dispatch: {}

concurrency:
  group: seo-keyword-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch + apply trending keywords
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pytrends>=4.9"

      - name: Fetch trending keywords
        run: python3 scripts/keyword_refresh.py

      - name: Apply keywords to marker-delimited regions
        run: python3 scripts/apply_keywords.py

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(seo): rotate keywords ${{ github.run_id }}"
          branch: bot/seo-keyword-refresh
          title: "SEO: weekly keyword rotation"
          body: |
            Auto-generated by `seo-keyword-refresh.yml`.

            Source: pytrends MX, 30-day window.
            Owner reviews this PR before merging — do NOT auto-merge.

            Affected files: only regions inside `<!-- KW:start --> ... <!-- KW:end -->`
            markers, `data-keyword-slot` spans, and JSON-LD `keywords` arrays.
            Hand-curated copy is never modified.

            Rollback: `git revert <sha>` on `main` and Cloudflare redeploys.
          delete-branch: true
