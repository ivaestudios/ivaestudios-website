<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada · IVAE Studios</title>
  <meta name="description" content="La página que buscabas se movió o no existe. Vuelve al inicio o cuéntanos tus fechas.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/images/icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1A2433">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/styles/fonts/dm-serif-display-400-latin.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/styles/fonts/inter-variable-latin.woff2">
  <link rel="stylesheet" href="/styles/main.css">
  <style>
    .page-404 { min-height: 100svh; display: grid; place-items: center; background: var(--deep-atlantic); color: var(--resort-white); }
    .error-404 { text-align: center; padding-block: var(--space-8); }
    .error-404__num { font-family: var(--font-display); font-size: clamp(120px, 20vw, 240px); line-height: 0.85; color: var(--editorial-gold); margin-block: var(--space-5); }
    .error-404__title { font-family: var(--font-display); font-size: clamp(24px, 3vw, 36px); line-height: 1.2; color: var(--resort-white); max-width: 28ch; margin-inline: auto; }
    .error-404__title em { font-family: var(--font-accent); font-style: italic; color: var(--editorial-gold); }
    .error-404__lede { font-family: var(--font-body); font-size: 16px; color: rgb(249 248 247 / 0.85); margin-top: var(--space-7); margin-bottom: var(--space-4); }
    .error-404__links { list-style: none; padding: 0; display: flex; flex-direction: column; gap: var(--space-3); }
    .error-404__links a { color: var(--editorial-gold); text-decoration: none; font-family: var(--font-body); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; }
    .error-404__links a:hover { color: var(--resort-white); }
    .error-404__sign { margin-top: var(--space-9); font-family: var(--font-body); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: rgb(249 248 247 / 0.5); }
    .error-404__sign span { font-family: var(--font-accent); font-style: italic; color: var(--editorial-gold); font-size: 18px; margin-right: var(--space-2); }
  </style>
</head>
<body class="page-404">
  <main class="container container--prose error-404">
    <p class="eyebrow">404 · Page not found</p>
    <h1 class="error-404__num">404</h1>
    <p class="error-404__title">La página que buscabas <em>se movió o no existe</em>.</p>
    <p class="error-404__lede">Sin problema. Desde aquí puedes&hellip;</p>
    <ul class="error-404__links">
      <li><a href="/es/">Volver al inicio</a></li>
      <li><a href="/es/blog">Leer el diario</a></li>
      <li><a href="/es/#contact">Cuéntanos tus fechas</a></li>
      <li><a href="/">Switch to English</a></li>
    </ul>
    <p class="error-404__sign">
      <span aria-hidden="true">&AElig;</span>
      IVAE Studios &middot; Riviera Maya &middot; 2026
    </p>
  </main>
</body>
</html>
