<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — IVAE Studios</title>
<link rel="icon" type="image/svg+xml" href="/gallery/favicon.svg"/>
<link rel="stylesheet" href="/gallery/css/gallery.css?v=20260428"/>
</head>
<body class="auth-page" style="padding-top:0;">

<div class="auth-split">
  <div class="auth-brand">
    <div class="auth-brand-content">
      <div class="auth-brand-logo">IVAE <span>Studios</span></div>
      <div class="auth-brand-line"></div>
      <p class="auth-brand-tagline">Luxury Resort Photography</p>
      <p class="auth-brand-location">Cancun, Mexico</p>
    </div>
  </div>
  <div class="auth-side">
    <div class="auth-card" style="animation:fadeInUp 0.5s ease both;">
      <h2>Reset your password</h2>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <div id="error" class="auth-error"></div>
      <div id="success" class="auth-success"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required autocomplete="email"/>
        </div>
        <button type="submit" class="btn btn-gold" id="submitBtn">Send Reset Link</button>
      </form>

      <p class="auth-link"><a href="/gallery/">Back to Sign In</a></p>
    </div>
  </div>
</div>

<script src="/gallery/js/api.js?v=20260428"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  const successEl = document.getElementById('success');
  const btn = document.getElementById('submitBtn');
  errEl.classList.remove('show');
  successEl.classList.remove('show');
  btn.classList.add('loading');

  try {
    const res = await API.post('/auth/forgot-password', {
      email: document.getElementById('email').value
    });
    btn.classList.remove('loading');
    successEl.textContent = 'If this email is registered, you will receive a reset link shortly. Check your inbox.';
    successEl.classList.add('show');
    document.getElementById('forgotForm').style.display = 'none';

    // If reset token is returned (development mode), show the reset link
    if (res._resetToken) {
      const link = window.location.origin + '/gallery/reset-password.html?token=' + res._resetToken;
      const devNote = document.createElement('div');
      devNote.style.cssText = 'margin-top:16px;padding:12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;font-size:12px;word-break:break-all;';
      devNote.innerHTML = '<strong style="color:#0369a1;">Reset Link:</strong><br/><a href="' + link + '" style="color:#0284c7;">' + link + '</a>';
      successEl.after(devNote);
    }
  } catch (err) {
    btn.classList.remove('loading');
    errEl.textContent = err.message;
    errEl.classList.add('show');
  }
});
</script>
<style>
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</body>
</html>
