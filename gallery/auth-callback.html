<!DOCTYPE html>
<html><head><title>Connecting...</title>
<style>
body { font-family: 'Helvetica Neue', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fafafa; color: #333; }
.wrap { text-align: center; }
.spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #c9a96e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>Connecting your account...</p>
</div>
<script>
// This page handles OAuth callbacks for Dropbox and Google Drive.
// It extracts the auth code/token and sends it back to the parent window.

const params = new URLSearchParams(window.location.search);
const hash = new URLSearchParams(window.location.hash.substring(1));

// Dropbox PKCE returns ?code=...
const code = params.get('code');
// Google implicit returns #access_token=...
const accessToken = hash.get('access_token');
// Check for errors
const error = params.get('error') || hash.get('error');

if (error) {
  if (window.opener) {
    window.opener.postMessage({ type: 'oauth_error', error }, window.location.origin);
  }
  document.querySelector('p').textContent = 'Authorization failed. You can close this window.';
} else if (code) {
  // Dropbox PKCE flow — send code back to parent
  if (window.opener) {
    window.opener.postMessage({ type: 'oauth_code', provider: 'dropbox', code }, window.location.origin);
  }
  document.querySelector('p').textContent = 'Connected! This window will close...';
  setTimeout(() => window.close(), 1000);
} else if (accessToken) {
  // Google implicit flow — send token back to parent
  const tokenType = hash.get('token_type');
  const expiresIn = hash.get('expires_in');
  if (window.opener) {
    window.opener.postMessage({
      type: 'oauth_token',
      provider: 'google',
      access_token: accessToken,
      token_type: tokenType,
      expires_in: expiresIn
    }, window.location.origin);
  }
  document.querySelector('p').textContent = 'Connected! This window will close...';
  setTimeout(() => window.close(), 1000);
} else {
  document.querySelector('p').textContent = 'No authorization data received. You can close this window.';
}
</script>
</body>
</html>
