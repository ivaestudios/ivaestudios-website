<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Password — IVAE Studios</title>
<link rel="icon" type="image/svg+xml" href="/gallery/favicon.svg"/>
<link rel="stylesheet" href="/gallery/css/gallery.css?v=20260424"/>
</head>
<body class="auth-page" style="padding-top:0;">

<div class="auth-split">
  <div class="auth-brand">
    <div class="auth-brand-content">
      <div class="auth-brand-logo">IVAE <span>Studios</span></div>
      <div class="auth-brand-line"></div>
      <p class="auth-brand-tagline">Luxury Resort Photography</p>
      <p class="auth-brand-location">Cancun, Mexico</p>
    </div>
  </div>
  <div class="auth-side">
    <div class="auth-card" style="animation:fadeInUp 0.5s ease both;">
      <h2>Set new password</h2>
      <p class="auth-subtitle">Choose a secure password for your account</p>

      <div id="error" class="auth-error"></div>
      <div id="success" class="auth-success"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" class="form-input" id="password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password"/>
          <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="password2" placeholder="Repeat your password" required autocomplete="new-password"/>
          <div class="password-match" id="matchIndicator"></div>
        </div>
        <button type="submit" class="btn btn-gold" id="submitBtn">Update Password</button>
      </form>

      <p class="auth-link"><a href="/gallery/">Back to Sign In</a></p>
    </div>
  </div>
</div>

<script src="/gallery/js/api.js?v=20260424"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('error').textContent = 'Invalid reset link. Please request a new one.';
  document.getElementById('error').classList.add('show');
  document.getElementById('resetForm').style.display = 'none';
}

document.getElementById('password').addEventListener('input', (e) => {
  const val = e.target.value;
  const bar = document.getElementById('strengthBar');
  bar.className = 'password-strength-bar';
  if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) {
    bar.classList.add('strong');
  } else if (val.length >= 6) {
    bar.classList.add('medium');
  } else if (val.length > 0) {
    bar.classList.add('weak');
  }
  checkMatch();
});

document.getElementById('password2').addEventListener('input', checkMatch);

function checkMatch() {
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('password2').value;
  const indicator = document.getElementById('matchIndicator');
  if (!p2) { indicator.textContent = ''; indicator.className = 'password-match'; return; }
  if (p1 === p2) {
    indicator.textContent = 'Passwords match';
    indicator.className = 'password-match match';
  } else {
    indicator.textContent = 'Passwords do not match';
    indicator.className = 'password-match no-match';
  }
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  const successEl = document.getElementById('success');
  const btn = document.getElementById('submitBtn');
  errEl.classList.remove('show');
  successEl.classList.remove('show');

  const password = document.getElementById('password').value;
  if (password !== document.getElementById('password2').value) {
    errEl.textContent = 'Passwords do not match';
    errEl.classList.add('show');
    return;
  }

  btn.classList.add('loading');

  try {
    const res = await API.post('/auth/reset-password', { token, password });
    btn.classList.remove('loading');
    successEl.textContent = 'Password updated successfully! Redirecting to sign in...';
    successEl.classList.add('show');
    document.getElementById('resetForm').style.display = 'none';
    setTimeout(() => { window.location.href = '/gallery/'; }, 2000);
  } catch (err) {
    btn.classList.remove('loading');
    errEl.textContent = err.message;
    errEl.classList.add('show');
  }
});
</script>
<style>
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</body>
</html>
