<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio — IVAE Studios</title>
<link rel="icon" type="image/svg+xml" href="/gallery/favicon.svg"/>
<meta property="og:title" content="Portfolio — IVAE Studios"/>
<meta property="og:description" content="Luxury resort photography in Cancun, Mexico"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="IVAE Studios"/>
<link rel="preload" as="font" type="font/woff2" crossorigin href="/gallery/fonts/cormorant-garamond-latin.woff2?v=20260428b"><link rel="preload" as="font" type="font/woff2" crossorigin href="/gallery/fonts/syne-latin.woff2?v=20260428b"><link rel="stylesheet" href="/gallery/fonts/fonts.css?v=20260428b"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:#fff;color:#1a1a1a;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}

/* ── PAGE LOADER ── */
.pf-loader{position:fixed;inset:0;z-index:100;background:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .4s ease;}
.pf-loader.out{opacity:0;pointer-events:none;}
.pf-loader-dot{width:6px;height:6px;border-radius:50%;background:#c8b88a;animation:pf-pulse 1.2s infinite ease-in-out;}
.pf-loader-dot:nth-child(2){animation-delay:.15s;margin:0 8px;}
.pf-loader-dot:nth-child(3){animation-delay:.3s;}
@keyframes pf-pulse{0%,80%,100%{opacity:.25;transform:scale(.8);}40%{opacity:1;transform:scale(1.1);}}

/* ── HERO ── */
.pf-hero{
  min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:100px 24px 70px;position:relative;
  background:#fafaf8;overflow:hidden;
}
.pf-hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 35%, rgba(196,163,90,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 65%, rgba(168,137,74,0.04) 0%, transparent 55%);
  animation:pfGlow 10s ease-in-out infinite alternate;
}
@keyframes pfGlow{
  0%{opacity:0.5;transform:scale(1);}
  100%{opacity:1;transform:scale(1.08);}
}
.pf-hero-brand{
  position:relative;z-index:1;
  font-size:9px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  color:#c8b88a;margin-bottom:36px;
  animation:pfFadeIn .8s ease .2s both;
}
.pf-hero h1{
  position:relative;z-index:1;
  font-family:'Cormorant Garamond',serif;font-size:clamp(48px,8vw,80px);
  font-weight:300;letter-spacing:3px;line-height:1.1;color:#1a1a1a;
  margin-bottom:22px;
  animation:pfFadeIn .8s ease .35s both;
}
.pf-hero p{
  position:relative;z-index:1;
  font-size:13px;letter-spacing:1.5px;color:#999;text-transform:uppercase;
  font-weight:500;max-width:500px;line-height:1.7;
  animation:pfFadeIn .8s ease .5s both;
}
.pf-hero-line{
  position:relative;z-index:1;
  width:48px;height:1px;background:linear-gradient(90deg,transparent,#c8b88a,transparent);
  opacity:0.35;margin:32px auto 0;
  animation:pfLineIn 1.2s ease .8s both;
}
@keyframes pfFadeIn{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes pfLineIn{
  from{width:0;opacity:0;}
  to{width:48px;opacity:0.35;}
}

/* ── GALLERY GRID ── */
.pf-grid-wrap{
  max-width:1260px;margin:0 auto;padding:0 24px 80px;flex:1;
}
.pf-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
}
.pf-card{
  position:relative;overflow:hidden;border-radius:6px;
  aspect-ratio:4/5;cursor:pointer;
  background:#f5f5f3;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.pf-card img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 1s cubic-bezier(.16,1,.3,1),opacity .6s ease;
  opacity:0;
}
.pf-card:hover img{transform:scale(1.07);}

/* Overlay */
.pf-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,0) 60%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:32px 28px;
  opacity:0;transition:opacity .5s cubic-bezier(.4,0,.2,1);
}
.pf-card:hover .pf-card-overlay{opacity:1;}
.pf-card-title{
  font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;
  color:#fff;letter-spacing:0.5px;margin-bottom:6px;
  transform:translateY(8px);transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.pf-card:hover .pf-card-title{transform:translateY(0);}
.pf-card-meta{
  font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.5);
  transform:translateY(8px);transition:transform .5s cubic-bezier(.4,0,.2,1) .05s;
}
.pf-card:hover .pf-card-meta{transform:translateY(0);}
.pf-card-count{
  position:absolute;top:16px;right:16px;
  font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:#fff;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);
  padding:5px 12px;border-radius:20px;
  opacity:0;transform:translateY(-4px);
  transition:opacity .3s ease,transform .3s ease;
}
.pf-card:hover .pf-card-count{opacity:1;transform:translateY(0);}

/* Entrance animation */
.pf-card{
  animation:pf-fadeUp .6s ease both;
}
@keyframes pf-fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── FEATURED (first card spans 2 cols) ── */
.pf-card.pf-featured{
  grid-column:span 2;aspect-ratio:8/5;
}
.pf-card.pf-featured .pf-card-title{font-size:32px;}

/* ── EMPTY ── */
.pf-empty{
  text-align:center;padding:80px 24px;
}
.pf-empty h3{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;
  color:#999;margin-bottom:10px;
}
.pf-empty p{font-size:13px;color:#ccc;letter-spacing:0.3px;}

/* ── FOOTER ── */
.pf-footer{
  text-align:center;padding:48px 24px 40px;border-top:1px solid #f0f0f0;
}
.pf-footer-brand{
  font-family:'Syne',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:0.25em;text-transform:uppercase;color:#ccc;
}
.pf-footer-brand span{color:#c8b88a;}
.pf-footer p{font-size:11px;color:#aaa;margin-top:6px;letter-spacing:0.3px;}

/* ── RESPONSIVE ── */
@media (max-width:900px){
  .pf-grid{grid-template-columns:repeat(2,1fr);gap:14px;}
  .pf-card.pf-featured{grid-column:span 2;}
  .pf-hero{min-height:40vh;padding:60px 20px 40px;}
}
@media (max-width:560px){
  .pf-grid{grid-template-columns:1fr;gap:12px;}
  .pf-card.pf-featured{grid-column:span 1;aspect-ratio:4/5;}
  .pf-card-overlay{opacity:1;}
  .pf-card-count{opacity:1;}
  .pf-card-title{font-size:20px;}
  .pf-hero h1{font-size:36px;}
}
</style>
</head>
<body>

<!-- Loader -->
<div class="pf-loader" id="pfLoader">
  <div class="pf-loader-dot"></div>
  <div class="pf-loader-dot"></div>
  <div class="pf-loader-dot"></div>
</div>

<!-- Hero -->
<section class="pf-hero">
  <div class="pf-hero-brand">IVAE STUDIOS</div>
  <h1>Portfolio</h1>
  <p>Luxury resort photography — Cancun, Mexico</p>
  <div class="pf-hero-line"></div>
</section>

<!-- Gallery Grid -->
<div class="pf-grid-wrap">
  <div class="pf-grid" id="pfGrid"></div>
  <div class="pf-empty" id="pfEmpty" style="display:none;">
    <h3>Portfolio coming soon</h3>
    <p>Beautiful galleries will appear here.</p>
  </div>
</div>

<!-- Footer -->
<footer class="pf-footer">
  <span class="pf-footer-brand">IVAE <span>Studios</span></span>
  <p>Luxury Resort Photography — Cancun, Mexico</p>
</footer>

<script>
(async () => {
  try {
    const res = await fetch('/api/gallery/portfolio');
    const galleries = await res.json();
    const grid = document.getElementById('pfGrid');

    if (!galleries.length) {
      document.getElementById('pfEmpty').style.display = 'block';
    } else {
      galleries.forEach((g, i) => {
        const card = document.createElement('a');
        card.href = '/gallery/gallery?id=' + g.id;
        card.className = 'pf-card' + (i === 0 ? ' pf-featured' : '');
        card.style.animationDelay = (i * 0.08) + 's';

        const dateStr = g.session_date
          ? new Date(g.session_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
          : '';

        const occasion = g.occasion
          ? g.occasion.charAt(0).toUpperCase() + g.occasion.slice(1)
          : '';

        const coverId = g.cover_key || g.first_photo_id;
        const coverSrc = coverId
          ? '/api/gallery/photos/' + coverId + '/thumb'
          : '';

        card.innerHTML = `
          ${coverSrc ? `<img src="${coverSrc}" alt="${g.title}" loading="lazy" onload="this.style.opacity=1"/>` : ''}
          <div class="pf-card-overlay">
            <div class="pf-card-title">${g.title}</div>
            <div class="pf-card-meta">${[occasion, dateStr].filter(Boolean).join(' — ')}</div>
          </div>
          ${g.photo_count ? `<div class="pf-card-count">${g.photo_count} photos</div>` : ''}
        `;
        grid.appendChild(card);
      });
    }
  } catch (err) {
    document.getElementById('pfEmpty').style.display = 'block';
  }

  // Remove loader
  const loader = document.getElementById('pfLoader');
  loader.classList.add('out');
  setTimeout(() => loader.remove(), 400);
})();
</script>
</body>
</html>
