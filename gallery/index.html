<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IVAE Studios — Client Gallery</title>
<link rel="icon" type="image/svg+xml" href="/gallery/favicon.svg"/>
<meta property="og:title" content="IVAE Studios — Client Gallery"/>
<meta property="og:description" content="Luxury resort photography by IVAE Studios, Cancun"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="IVAE Studios"/>
<link rel="stylesheet" href="/gallery/css/gallery.css"/>
</head>
<body class="auth-page" style="padding-top:0;">

<div class="page-loader" id="pageLoader">
  <div class="page-loader-spinner"></div>
</div>

<div class="auth-split">
  <div class="auth-brand">
    <div class="auth-brand-content">
      <div class="auth-brand-logo">IVAE <span>Studios</span></div>
      <div class="auth-brand-line"></div>
      <p class="auth-brand-tagline">Luxury Resort Photography</p>
      <p class="auth-brand-location">Cancun, Mexico</p>
    </div>
  </div>
  <div class="auth-side">
    <div class="auth-card" id="authCard">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to view your gallery</p>

      <div id="error" class="auth-error"></div>

      <!-- Google login -->
      <div class="social-login">
        <a href="/api/gallery/auth/google" id="googleLoginBtn" class="social-btn social-google">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </a>
      </div>

      <div class="auth-divider"><span>or sign in with email</span></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password" class="form-input" id="password" placeholder="Your password" required autocomplete="current-password" style="padding-right:42px;"/>
            <button type="button" id="togglePw" onclick="toggleLoginPassword()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#bbb;display:flex;align-items:center;transition:color 0.2s;" aria-label="Show password">
              <svg id="eyeOpen" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <svg id="eyeClosed" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="display:none;"><path d="M3.98 8.223A10.477 10.477 0 001.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group" style="text-align:right;margin-top:-4px;margin-bottom:4px;">
          <a href="/gallery/forgot-password" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-gold" id="submitBtn">Sign In</button>
      </form>

      <p class="auth-link">Don't have an account? <a href="/gallery/register">Register here</a></p>
    </div>
  </div>
</div>

<script src="/gallery/js/api.js"></script>
<script>
function toggleLoginPassword() {
  const input = document.getElementById('password');
  const open = document.getElementById('eyeOpen');
  const closed = document.getElementById('eyeClosed');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  open.style.display = isHidden ? 'none' : 'block';
  closed.style.display = isHidden ? 'block' : 'none';
}
</script>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const redirectUrl = params.get('redirect');
  const err = params.get('error');

  // Show Google OAuth error if redirected from callback with error
  if (err) {
    const detail = params.get('detail') || '';
    const errEl = document.querySelector('.auth-error');
    const msg = err === 'google_denied' ? 'Google sign-in was cancelled.' :
                err === 'google_failed' ? 'Google authentication failed: ' + detail :
                err === 'google_no_email' ? 'Google account did not return an email.' :
                'Google sign-in error: ' + detail;
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
    else alert(msg);
  }

  // If there's a redirect param (from email link), always show login — don't auto-redirect
  if (!redirectUrl) {
    try {
      const user = await API.get('/auth/me');
      window.location.href = user.role === 'admin' ? '/gallery/admin/' : '/gallery/galleries.html';
      return;
    } catch {}
  } else {
    // Pass redirect param to Google OAuth so it lands on the right page after login
    const googleBtn = document.getElementById('googleLoginBtn');
    if (googleBtn) googleBtn.href = '/api/gallery/auth/google?redirect=' + encodeURIComponent(redirectUrl);
  }

  const loader = document.getElementById('pageLoader');
  loader.classList.add('fade-out');
  setTimeout(() => loader.remove(), 400);
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  const btn = document.getElementById('submitBtn');
  errEl.classList.remove('show');
  btn.classList.add('loading');

  try {
    const user = await API.post('/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    const redir = new URLSearchParams(window.location.search).get('redirect');
    window.location.href = redir || (user.role === 'admin' ? '/gallery/admin/' : '/gallery/galleries.html');
  } catch (err) {
    btn.classList.remove('loading');
    errEl.textContent = err.message;
    errEl.classList.add('show');
    errEl.style.animation = 'none';
    errEl.offsetHeight;
    errEl.style.animation = 'shake 0.4s ease';
  }
});
</script>
<style>
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
</style>
</body>
</html>
