<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found — IVAE Studios</title>
<link rel="icon" type="image/svg+xml" href="/gallery/favicon.svg"/>
<link rel="stylesheet" href="/gallery/css/gallery.css"/>
</head>
<body class="auth-page" style="padding-top:0;background:#fafaf8;">

<div style="text-align:center;max-width:480px;padding:40px 24px;position:relative;">
  <div class="nf-logo" style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.35em;text-transform:uppercase;color:#1a1a1a;margin-bottom:56px;">
    IVAE <span style="color:#a8894a;">Studios</span>
  </div>
  <h1 class="nf-number" style="font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:300;color:transparent;line-height:1;margin-bottom:16px;background:linear-gradient(135deg,#c4a35a,#a8894a,#d4bc78);-webkit-background-clip:text;background-clip:text;">404</h1>
  <p class="nf-text" style="font-size:14px;color:#aaa;letter-spacing:0.5px;margin-bottom:44px;line-height:1.8;">The page you're looking for doesn't exist<br/>or has been moved.</p>
  <a href="/gallery/" class="nf-btn" style="display:inline-flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#1a1a1a;text-decoration:none;padding:16px 36px;border:1px solid #ddd;border-radius:6px;transition:all 0.4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
    Back to Home
  </a>
</div>

<style>
.nf-logo { animation: nfFade 0.6s ease 0.1s both; }
.nf-number { animation: nfScale 0.8s cubic-bezier(.4,0,.2,1) 0.2s both; }
.nf-text { animation: nfFade 0.6s ease 0.4s both; }
.nf-btn { animation: nfFade 0.6s ease 0.55s both; }
@keyframes nfFade {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes nfScale {
  from { opacity: 0; transform: scale(0.85) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.nf-btn:hover {
  border-color: var(--gold2) !important;
  background: rgba(196,163,90,0.05) !important;
  box-shadow: 0 4px 20px rgba(196,163,90,0.08) !important;
  transform: translateY(-2px) !important;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(196,163,90,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 70%, rgba(168,137,74,0.03) 0%, transparent 55%);
  animation: nfGlow 10s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes nfGlow {
  0% { opacity: 0.4; }
  100% { opacity: 1; }
}
</style>
</body>
</html>
