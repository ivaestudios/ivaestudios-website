<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0A0A0E">
  <title>Panel · IVAE Marketing</title>
  <meta name="description" content="Panel de equipo: calendario de contenido, tablero y aprobaciones de IVAE Marketing.">

  <!-- Inter (respaldo) + Outfit (tema Sistema IVA 2026) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap">

  <!-- CSS base: tokens v1 + componentes (app.css), tokens v2 aditivos y shell v2 -->
  <link rel="stylesheet" href="/marketing/css/app.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/tokens2.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/shell.css?v=202606200200">

  <!-- CSS de vistas. Los modulos JS se cargan lazy via import(), pero su CSS se
       sirve estatico desde aqui para evitar FOUC al navegar (solo mywork.css se
       auto-inyecta desde su modulo; este link estatico la dedupe igualmente). -->
  <link rel="stylesheet" href="/marketing/css/dashboard.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/meses.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/calendar.css?v=202606200200">

  <!-- SW del sitio (v13+): sirve /marketing/ con cache no-store para que cada
       deploy llegue al instante (el TTL de 4h de la zona pisa el max-age=0). -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    }
  </script>
  <link rel="stylesheet" href="/marketing/css/kanban.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/table.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/timeline.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/mywork.css?v=202606200200">
  <link rel="stylesheet" href="/marketing/css/editor.css?v=202606200200">

  <!-- Tema "Sistema IVA" 2026 (rediseno Claude Design). ULTIMO link de estilo
       para ganar la cascada de :root. Solo estilo (tokens + Outfit); no toca
       markup ni logica. Rollback limpio = quitar esta linea. -->
  <link rel="stylesheet" href="/marketing/css/theme-sistemaiva.css?v=202606200200">

  <style>
    /* El atributo hidden SIEMPRE gana, incluso sobre reglas display de autor
       (#subhead es display:flex en shell.css y shell.js togglea su hidden). */
    [hidden] { display: none !important; }

    /* Splash de arranque. shell.boot() escribe errores en .muted, puede anexar
       un boton Reintentar, y al terminar agrega .is-hidden y remueve el nodo. */
    #boot {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 24px; text-align: center;
      background: var(--bg); color: var(--text-mute);
      transition: opacity .3s ease;
    }
    #boot.is-hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <!-- Splash inicial (lo desvanece shell.boot) -->
  <div id="boot" role="status" aria-live="polite">
    <span class="spinner spinner--lg" aria-hidden="true"></span>
    <span class="muted">Cargando tu espacio de trabajo</span>
  </div>

  <!-- Shell v2. El chrome se monta UNA sola vez:
       topbar.js llena #topbar, shell.js arma #subhead, el router monta cada
       vista en #view, bottomnav.js llena #bottomnav y pinta el FAB en #fabHost. -->
  <div id="app" hidden>
    <header id="topbar"></header>
    <div id="subhead" hidden></div>
    <main id="viewScroll">
      <div id="view"></div>
    </main>
    <nav id="bottomnav" aria-label="Navegación principal"></nav>
    <div id="fabHost"></div>
  </div>

  <!-- Capas globales (sheets y toasts viven fuera de #app: funcionan aunque
       el app siga oculto durante el boot). -->
  <div id="sheetHost"></div>
  <div id="toastHost" class="toast-host" role="status" aria-live="polite"></div>

  <noscript>
    <p style="padding:24px;text-align:center">Necesitas JavaScript activado para usar el panel.</p>
  </noscript>

  <!-- Unico script de la app v2 (composition root).
       ROLLBACK INSTANTANEO: re-apuntar esta linea a /marketing/js/app.js?v=3
       y restaurar el esqueleto legacy; js/app.js sigue intacto en el repo. -->
  <script type="module" src="/marketing/js/main.js?v=202606200200"></script>
</body>
</html>
