<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0A0A0E">
  <title>Iniciar sesión · IVAE Marketing</title>
  <meta name="description" content="Acceso privado al calendario de contenido de IVAE Marketing.">

  <!-- Inter (respaldo) + Outfit (tema Sistema IVA 2026) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/marketing/css/app.css?v=202607081853">
  <link rel="stylesheet" href="/marketing/css/tokens2.css?v=202607081853">
  <!-- Tema "Sistema IVA" 2026 (ultimo para ganar :root; solo estilo). -->
  <link rel="stylesheet" href="/marketing/css/theme-sistemaiva.css?v=202607081853">

  <style>
    /* Toques v2 (solo estetica, el flujo de auth no cambia): targets tactiles
       y tipografia de la escala nueva de tokens2.css. Inputs a 16px SIEMPRE:
       con <16px iOS Safari zoomea toda la pagina al enfocar (y el login es la
       entrada movil mas frecuente). */
    .auth-card .btn { min-height: var(--tap, 44px); }
    .auth-card .input { min-height: var(--tap, 44px); font-size: 16px; }
    .auth-card__sub { font-size: var(--fs-2, 13px); }
    .auth-foot { font-size: var(--fs-2, 13px); }
  </style>
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card" aria-labelledby="authTitle">
      <div class="auth-card__brand">
        <span class="logo">
          <span class="logo__mark" aria-hidden="true">
            <!-- camera / spark mark -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8.5a2 2 0 0 1 2-2h2l1.2-1.6a1 1 0 0 1 .8-.4h6a1 1 0 0 1 .8.4L17 6.5h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <circle cx="12" cy="12.5" r="3.2"/>
            </svg>
          </span>
          <span class="logo__word"><b>IVAE</b><span class="grad-text">Marketing</span></span>
        </span>
      </div>

      <h1 id="authTitle">Iniciar sesión</h1>
      <p class="auth-card__sub">Calendario de contenido y aprobaciones.</p>

      <!-- Inline alert (errors / notices) -->
      <div class="alert alert--error" id="alert" role="alert" hidden style="margin-top:var(--s-5)">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16.5" x2="12" y2="16.5"/></svg>
        </span>
        <span id="alertMsg"></span>
      </div>

      <form id="loginForm" novalidate autocomplete="on">
        <div class="field">
          <label class="label" for="email">Usuario o correo</label>
          <div class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
            </span>
            <input class="input" id="email" name="email" type="text"
                   autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="Tu usuario o correo" required>
          </div>
        </div>

        <div class="field">
          <label class="label" for="password">Contraseña</label>
          <div class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            </span>
            <input class="input input--pass" id="password" name="password" type="password"
                   autocomplete="current-password" placeholder="Tu contraseña" required>
            <button type="button" class="pass-eye" id="togglePass" aria-label="Mostrar contraseña" aria-pressed="false">
              <svg class="pass-eye__show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="pass-eye__hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.4 5.2A10.4 10.4 0 0 1 12 5c6.5 0 10 7 10 7a17.3 17.3 0 0 1-2.9 3.8"/><path d="M6.3 6.3A17 17 0 0 0 2 12s3.5 7 10 7a10 10 0 0 0 3-.45"/></svg>
            </button>
          </div>
        </div>

        <button class="btn btn-primary" id="submitBtn" type="submit">Entrar</button>
      </form>

      <!-- Cambio de contraseña forzado (must_reset): se muestra tras un login
           exitoso con contraseña temporal. No se redirige hasta cambiarla. -->
      <form id="resetForm" novalidate hidden>
        <p class="auth-card__sub" style="margin-bottom:var(--s-4)">
          Tu contraseña es temporal. Crea una nueva para continuar.
        </p>
        <div class="field">
          <label class="label" for="newPass">Nueva contraseña</label>
          <div class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            </span>
            <input class="input" id="newPass" type="password"
                   autocomplete="new-password" placeholder="Mínimo 6 caracteres" required>
          </div>
        </div>
        <div class="field">
          <label class="label" for="newPass2">Confirma la nueva contraseña</label>
          <div class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            </span>
            <input class="input" id="newPass2" type="password"
                   autocomplete="new-password" placeholder="Repite la contraseña" required>
          </div>
        </div>
        <button class="btn btn-primary" id="resetBtn" type="submit">Guardar y entrar</button>
      </form>

      <!-- Registro público: crea marca (workspace) + cuenta + sesión (POST /auth/signup). -->
      <form id="signupForm" novalidate hidden autocomplete="on">
        <div class="field">
          <label class="label" for="sgName">Tu nombre</label>
          <div class="input-wrap"><input class="input" id="sgName" type="text" autocomplete="name" placeholder="Ana Pérez" required></div>
        </div>
        <div class="field">
          <label class="label" for="sgBrand">Tu marca o negocio</label>
          <div class="input-wrap"><input class="input" id="sgBrand" type="text" autocomplete="organization" placeholder="Café Aurora" required></div>
        </div>
        <div class="field">
          <label class="label" for="sgEmail">Correo</label>
          <div class="input-wrap"><input class="input" id="sgEmail" type="email" inputmode="email" autocomplete="email" placeholder="tu@correo.com" required></div>
        </div>
        <div class="field">
          <label class="label" for="sgPass">Crea una contraseña</label>
          <div class="input-wrap"><input class="input" id="sgPass" type="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres" minlength="8" required></div>
        </div>
        <button class="btn btn-primary" id="sgBtn" type="submit">Crear mi cuenta</button>
      </form>

      <!-- Olvidé mi contraseña: manda el enlace de reset por correo (POST /auth/forgot). -->
      <form id="forgotForm" novalidate hidden>
        <p class="auth-card__sub" style="margin-bottom:var(--s-4)">
          Escribe tu correo y te mandamos un enlace para crear una contraseña nueva.
        </p>
        <div class="field">
          <label class="label" for="fgEmail">Correo</label>
          <div class="input-wrap"><input class="input" id="fgEmail" type="email" inputmode="email" autocomplete="email" placeholder="tu@correo.com" required></div>
        </div>
        <button class="btn btn-primary" id="fgBtn" type="submit">Enviarme el enlace</button>
      </form>

      <p class="auth-foot" id="authFoot">
        <button type="button" id="toSignup"
          style="background:none;border:0;color:var(--brand);cursor:pointer;font:inherit;font-weight:700;text-decoration:underline;padding:6px">
          ¿Nueva marca? Crea tu cuenta gratis
        </button>
        <br>
        <button type="button" id="toForgot"
          style="background:none;border:0;color:var(--text-dim);cursor:pointer;font:inherit;text-decoration:underline;margin-top:4px;padding:6px">
          Olvidé mi contraseña
        </button>
        <br>
        <button type="button" id="toggleSetup"
          style="background:none;border:0;color:var(--text-mute);cursor:pointer;font:inherit;text-decoration:underline;margin-top:8px;padding:6px;font-size:12px">
          Configuración inicial (primera vez)
        </button>
      </p>

      <!-- First-admin bootstrap. /auth/register only succeeds ONCE, for the authorized
           owner email, when no admin exists yet. Self-disables afterward (returns 403). -->
      <form id="setupForm" novalidate hidden
        style="margin-top:var(--s-4);border-top:1px solid var(--border);padding-top:var(--s-5)">
        <p class="auth-card__sub" style="margin-bottom:var(--s-4)">
          Crea la cuenta de administradora. Solo se permite una vez, con el correo autorizado.
        </p>
        <div class="field">
          <label class="label" for="suName">Tu nombre</label>
          <div class="input-wrap"><input class="input" id="suName" type="text" placeholder="Vianey Díaz" required></div>
        </div>
        <div class="field">
          <label class="label" for="suEmail">Correo de administradora</label>
          <div class="input-wrap"><input class="input" id="suEmail" type="email" inputmode="email" autocomplete="email" placeholder="vianeydm07@gmail.com" required></div>
        </div>
        <div class="field">
          <label class="label" for="suPass">Crea una contraseña</label>
          <div class="input-wrap"><input class="input" id="suPass" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required></div>
        </div>
        <button class="btn btn-primary" id="suBtn" type="submit">Crear administradora</button>
      </form>
    </section>
  </main>

  <div class="toast-host" role="status" aria-live="polite"></div>

  <script type="module">
    import { api, toast } from '/marketing/js/api.js?v=4';

    const form    = document.getElementById('loginForm');
    const emailEl  = document.getElementById('email');
    const passEl   = document.getElementById('password');
    const btn      = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alert');
    const alertMsg = document.getElementById('alertMsg');

    function showError(msg) {
      alertMsg.textContent = msg;
      alertBox.hidden = false;
    }
    function clearError() { alertBox.hidden = true; alertMsg.textContent = ''; }

    function destFor(role) {
      // Todos (staff y cliente) usan la app; el shell limita la vista del cliente
      // a SU marca (calendario compartido editable).
      return '/marketing/app.html';
    }

    // returnTo: el shell guarda el hash en prefs (mkt2.<userId>.returnTo, JSON)
    // cuando una sesión staff expira con 401. Aquí se consume UNA vez tras el
    // login para devolver a la dueña al deep-link exacto (#/post/x?comment=y).
    // Solo staff (el portal cliente no usa hash) y solo hashes (#...): nada de
    // rutas inyectadas.
    function takeReturnTo(user) {
      if (!user || !user.id || user.role === 'client') return '';
      const key = 'mkt2.' + user.id + '.returnTo';
      let hash = '';
      try {
        hash = JSON.parse(localStorage.getItem(key) || '""');
        localStorage.removeItem(key);
      } catch { hash = ''; }
      return (typeof hash === 'string' && hash.startsWith('#')) ? hash : '';
    }

    function goToApp(user) {
      location.replace(destFor(user.role) + takeReturnTo(user));
    }

    // If already logged in, skip the form. Non-blocking: the form renders
    // regardless, this just redirects in the background if a session exists.
    (async () => {
      try {
        const me = await api.get('/auth/me');
        if (me && me.role) goToApp(me);
      } catch { /* not logged in, stay on login, that's fine */ }
    })();

    // ── Cambio de contraseña forzado (must_reset) ──────────────────────────────
    // POST /auth/login devuelve must_reset=true para cuentas con contraseña
    // temporal: NO se redirige; se pide una nueva contraseña y solo tras
    // /auth/change-password (que limpia must_reset en el server) se entra.
    const resetForm = document.getElementById('resetForm');
    const newPassEl = document.getElementById('newPass');
    const newPass2El = document.getElementById('newPass2');
    const resetBtn  = document.getElementById('resetBtn');
    const authFoot  = document.getElementById('authFoot');
    let pendingReset = null; // { user, current } del login recién hecho

    function showResetForm(user, currentPassword) {
      pendingReset = { user, current: currentPassword };
      form.hidden = true;
      authFoot.hidden = true;
      document.getElementById('setupForm').hidden = true;
      document.getElementById('authTitle').textContent = 'Crea tu nueva contraseña';
      document.querySelector('.auth-card__sub').textContent =
        'Hola, ' + (user.name ? user.name.split(' ')[0] : '') + '. Por seguridad, cambia tu contraseña temporal.';
      resetForm.hidden = false;
      newPassEl.focus();
    }

    // El mismo formulario sirve para (a) cambio forzado tras login temporal y
    // (b) reset por token del correo (?reset=TOKEN de /auth/forgot).
    let pendingResetToken = null;

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      if (!pendingReset && !pendingResetToken) return;
      const next = newPassEl.value;
      const minLen = pendingResetToken ? 8 : 6;
      if (next.length < minLen) { showError('La nueva contraseña debe tener al menos ' + minLen + ' caracteres.'); return; }
      if (next !== newPass2El.value) { showError('Las contraseñas no coinciden.'); return; }
      resetBtn.dataset.loading = 'true';
      resetBtn.setAttribute('aria-busy', 'true');
      try {
        if (pendingResetToken) {
          await api.post('/auth/reset-with-token', { token: pendingResetToken, password: next });
          pendingResetToken = null;
          history.replaceState(null, '', location.pathname); // limpia ?reset= de la URL
          toast('Contraseña actualizada. Inicia sesión.', 'success', 2500);
          showView('login');
        } else {
          await api.post('/auth/change-password', { current: pendingReset.current, next });
          toast('Contraseña actualizada.', 'success', 1500);
          goToApp(pendingReset.user);
        }
      } catch (err) {
        showError(err.message || 'No se pudo cambiar la contraseña. Inténtalo de nuevo.');
      } finally {
        delete resetBtn.dataset.loading;
        resetBtn.removeAttribute('aria-busy');
      }
    });
    [newPassEl, newPass2El].forEach((f) => f.addEventListener('input', clearError));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showError('Escribe tu correo y tu contraseña.');
        return;
      }

      btn.dataset.loading = 'true';
      btn.setAttribute('aria-busy', 'true');
      try {
        const user = await api.post('/auth/login', { email, password });
        if (user && user.must_reset) {
          showResetForm(user, password);
          return;
        }
        toast('Bienvenido, ' + (user.name ? user.name.split(' ')[0] : '') + '.', 'success', 1500);
        goToApp(user);
      } catch (err) {
        const msg = err.status === 401
          ? 'Correo o contraseña incorrectos.'
          : (err.message || 'No pudimos iniciar sesión. Inténtalo de nuevo.');
        showError(msg);
        passEl.value = '';
        passEl.focus();
      } finally {
        delete btn.dataset.loading;
        btn.removeAttribute('aria-busy');
      }
    });

    // Clear the inline error as soon as the user edits a field.
    [emailEl, passEl].forEach((f) => f.addEventListener('input', clearError));

    // Ojo para mostrar/ocultar la contraseña.
    const togglePass = document.getElementById('togglePass');
    if (togglePass) {
      togglePass.addEventListener('click', () => {
        const reveal = passEl.type === 'password';
        passEl.type = reveal ? 'text' : 'password';
        togglePass.setAttribute('aria-pressed', String(reveal)); // el CSS intercambia el ícono
        togglePass.setAttribute('aria-label', reveal ? 'Ocultar contraseña' : 'Mostrar contraseña');
        passEl.focus();
      });
    }

    // ── First-admin bootstrap (only succeeds once, for the authorized owner email) ──
    const toggleSetup = document.getElementById('toggleSetup');
    const setupForm   = document.getElementById('setupForm');
    toggleSetup.addEventListener('click', () => {
      setupForm.hidden = !setupForm.hidden;
      if (!setupForm.hidden) document.getElementById('suName').focus();
    });
    setupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const name     = document.getElementById('suName').value.trim();
      const email    = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPass').value;
      if (!name || !email || !password) { showError('Completa nombre, correo y contraseña.'); return; }
      if (password.length < 6) { showError('La contraseña debe tener al menos 6 caracteres.'); return; }
      const b = document.getElementById('suBtn');
      b.dataset.loading = 'true'; b.setAttribute('aria-busy', 'true');
      try {
        const user = await api.post('/auth/register', { name, email, password });
        toast('Cuenta de administradora creada.', 'success', 1500);
        goToApp(user);
      } catch (err) {
        showError(err.status === 403
          ? 'El registro inicial ya se hizo, o este correo no es el autorizado. Inicia sesión arriba.'
          : (err.message || 'No se pudo crear la cuenta. Revisa que ya corriste la migración de la base de datos.'));
      } finally {
        delete b.dataset.loading; b.removeAttribute('aria-busy');
      }
    });

    // ── Registro público + olvidé mi contraseña (vistas de la misma card) ─────
    const signupForm = document.getElementById('signupForm');
    const forgotForm = document.getElementById('forgotForm');
    const toSignup   = document.getElementById('toSignup');
    const toForgot   = document.getElementById('toForgot');
    const titleEl    = document.getElementById('authTitle');
    const subEl      = document.querySelector('.auth-card__sub');

    function showView(view) {
      clearError();
      form.hidden = view !== 'login';
      signupForm.hidden = view !== 'signup';
      forgotForm.hidden = view !== 'forgot';
      resetForm.hidden = view !== 'resetToken';
      setupForm.hidden = true;
      toForgot.hidden = view !== 'login';
      toggleSetup.hidden = view !== 'login';
      if (view === 'signup') {
        titleEl.textContent = 'Crea tu cuenta';
        subEl.textContent = 'Tu marca, tu calendario de contenido. Gratis en 30 segundos.';
        toSignup.textContent = '¿Ya tienes cuenta? Inicia sesión';
        document.getElementById('sgName').focus();
      } else if (view === 'forgot') {
        titleEl.textContent = 'Recuperar acceso';
        subEl.textContent = '';
        toSignup.textContent = '← Volver a iniciar sesión';
      } else if (view === 'resetToken') {
        titleEl.textContent = 'Crea tu nueva contraseña';
        subEl.textContent = 'Elige una contraseña nueva de al menos 8 caracteres.';
        toSignup.textContent = '← Volver a iniciar sesión';
        newPassEl.focus();
      } else {
        titleEl.textContent = 'Iniciar sesión';
        subEl.textContent = 'Calendario de contenido y aprobaciones.';
        toSignup.textContent = '¿Nueva marca? Crea tu cuenta gratis';
        emailEl.focus();
      }
    }
    toSignup.addEventListener('click', () => {
      showView(form.hidden ? 'login' : 'signup');
    });
    toForgot.addEventListener('click', () => showView('forgot'));

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const name = document.getElementById('sgName').value.trim();
      const brand = document.getElementById('sgBrand').value.trim();
      const email = document.getElementById('sgEmail').value.trim();
      const password = document.getElementById('sgPass').value;
      if (!name || !brand || !email || !password) { showError('Completa todos los campos.'); return; }
      if (password.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return; }
      const b = document.getElementById('sgBtn');
      b.dataset.loading = 'true'; b.setAttribute('aria-busy', 'true');
      try {
        const user = await api.post('/auth/signup', { name, brand, email, password });
        toast('¡Bienvenido, ' + name.split(' ')[0] + '! Tu espacio está listo.', 'success', 2000);
        goToApp(user);
      } catch (err) {
        showError(err.status === 409
          ? 'Ese correo ya tiene una cuenta. Inicia sesión.'
          : (err.message || 'No pudimos crear tu cuenta. Inténtalo de nuevo.'));
      } finally {
        delete b.dataset.loading; b.removeAttribute('aria-busy');
      }
    });

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const email = document.getElementById('fgEmail').value.trim();
      if (!email) { showError('Escribe tu correo.'); return; }
      const b = document.getElementById('fgBtn');
      b.dataset.loading = 'true'; b.setAttribute('aria-busy', 'true');
      try {
        await api.post('/auth/forgot', { email });
        toast('Si ese correo tiene cuenta, te mandamos el enlace. Revisa tu bandeja.', 'success', 4000);
        showView('login');
      } catch (err) {
        showError(err.message || 'No se pudo enviar. Inténtalo de nuevo.');
      } finally {
        delete b.dataset.loading; b.removeAttribute('aria-busy');
      }
    });

    // ?reset=TOKEN (enlace del correo de /auth/forgot) → formulario de nueva
    // contraseña. ?signup=1 (CTA del sitio) → abre directo en crear cuenta.
    const params = new URLSearchParams(location.search);
    if (params.get('reset')) {
      pendingResetToken = params.get('reset');
      showView('resetToken');
    } else if (params.get('signup')) {
      showView('signup');
    }
  </script>
</body>
</html>
