<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0b0b12">
  <title>Iniciar sesión · IVAE Marketing</title>
  <meta name="description" content="Acceso privado al calendario de contenido de IVAE Marketing.">

  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/marketing/css/app.css">
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card" aria-labelledby="authTitle">
      <div class="auth-card__brand">
        <span class="logo">
          <span class="logo__mark" aria-hidden="true">
            <!-- camera / spark mark -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8.5a2 2 0 0 1 2-2h2l1.2-1.6a1 1 0 0 1 .8-.4h6a1 1 0 0 1 .8.4L17 6.5h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <circle cx="12" cy="12.5" r="3.2"/>
            </svg>
          </span>
          <span class="logo__word"><b>IVAE</b><span class="grad-text">Marketing</span></span>
        </span>
      </div>

      <h1 id="authTitle">Iniciar sesión</h1>
      <p class="auth-card__sub">Calendario de contenido y aprobaciones.</p>

      <!-- Inline alert (errors / notices) -->
      <div class="alert alert--error" id="alert" role="alert" hidden style="margin-top:var(--s-5)">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16.5" x2="12" y2="16.5"/></svg>
        </span>
        <span id="alertMsg"></span>
      </div>

      <form id="loginForm" novalidate autocomplete="on">
        <div class="field">
          <label class="label" for="email">Correo electrónico</label>
          <div class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            </span>
            <input class="input" id="email" name="email" type="email" inputmode="email"
                   autocomplete="email" placeholder="tucorreo@ejemplo.com" required>
          </div>
        </div>

        <div class="field">
          <label class="label" for="password">Contraseña</label>
          <div class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            </span>
            <input class="input" id="password" name="password" type="password"
                   autocomplete="current-password" placeholder="Tu contraseña" required>
          </div>
        </div>

        <button class="btn btn-primary" id="submitBtn" type="submit">Entrar</button>
      </form>

      <p class="auth-foot">
        Acceso privado de clientes y equipo IVAE Marketing.
      </p>
    </section>
  </main>

  <div class="toast-host" role="status" aria-live="polite"></div>

  <script type="module">
    import { api, toast } from '/marketing/js/api.js';

    const form    = document.getElementById('loginForm');
    const emailEl  = document.getElementById('email');
    const passEl   = document.getElementById('password');
    const btn      = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alert');
    const alertMsg = document.getElementById('alertMsg');

    function showError(msg) {
      alertMsg.textContent = msg;
      alertBox.hidden = false;
    }
    function clearError() { alertBox.hidden = true; alertMsg.textContent = ''; }

    function destFor(role) {
      // admin/team → team app; client → client portal.
      return role === 'client' ? '/marketing/client.html' : '/marketing/app.html';
    }

    // If already logged in, skip the form. Non-blocking: the form renders
    // regardless, this just redirects in the background if a session exists.
    (async () => {
      try {
        const me = await api.get('/auth/me');
        if (me && me.role) location.replace(destFor(me.role));
      } catch { /* not logged in — stay on login, that's fine */ }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showError('Escribe tu correo y tu contraseña.');
        return;
      }

      btn.dataset.loading = 'true';
      btn.setAttribute('aria-busy', 'true');
      try {
        const user = await api.post('/auth/login', { email, password });
        toast('Bienvenido, ' + (user.name ? user.name.split(' ')[0] : '') + '.', 'success', 1500);
        location.replace(destFor(user.role));
      } catch (err) {
        const msg = err.status === 401
          ? 'Correo o contraseña incorrectos.'
          : (err.message || 'No pudimos iniciar sesión. Inténtalo de nuevo.');
        showError(msg);
        passEl.value = '';
        passEl.focus();
      } finally {
        delete btn.dataset.loading;
        btn.removeAttribute('aria-busy');
      }
    });

    // Clear the inline error as soon as the user edits a field.
    [emailEl, passEl].forEach((f) => f.addEventListener('input', clearError));
  </script>
</body>
</html>
