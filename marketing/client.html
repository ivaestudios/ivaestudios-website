<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0A0A0E">
  <title>IVAE Marketing</title>
  <!-- VISTA RETIRADA. El "portal cliente" anterior (js/portal/*) ya NO se usa: el
       cliente entra al MISMO app que el equipo (/marketing/app), con su vista
       limitada a su marca. Esta página solo redirige para que cualquier bookmark
       o link viejo a /marketing/client(.html) caiga en la app real. -->
  <meta http-equiv="refresh" content="0; url=/marketing/app">
  <link rel="canonical" href="/marketing/app">
  <script>
    // replace() => no queda en el historial (el botón "atrás" no regresa al portal viejo).
    location.replace('/marketing/app');
  </script>
  <style>
    html, body { margin: 0; height: 100%; background: #0A0A0E; color: #9A9AA8;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .wrap { height: 100%; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; }
    a { color: #E24DA0; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <p>Llevándote a tu panel… Si no avanza, <a href="/marketing/app">toca aquí</a>.</p>
  </div>
</body>
</html>
